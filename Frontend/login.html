<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In | Christian Cuisine</title>
<meta name="theme-color" content="#FFE3B3" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="CSS/tokens.css" />
<link rel="stylesheet" href="CSS/base.css" />
<link rel="stylesheet" href="CSS/app.css" />
<script src="JS/theme.js"></script>
</head>
<body data-page="login">
<a href="#main" class="skip-link">Skip to content</a>

<div class="container" style="padding-top: var(--space-5);">
  <a href="index.html" class="auth-card__brand" style="display:inline-flex;">
    <span class="brand-mark" aria-hidden="true" style="width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--brand-honey),var(--brand-ember));display:grid;place-items:center;"></span>
    <span class="font-display" style="font-weight:600;">Christian Cuisine</span>
  </a>
  <button type="button" data-theme-toggle aria-pressed="false" title="Toggle theme" style="float:right;padding:var(--space-2);border-radius:var(--radius-full);background:var(--color-bg-subtle);">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<main id="main" class="auth-shell">
  <div class="auth-shell__form">
    <div class="auth-card">
      <p class="eyebrow">Welcome Back</p>
      <h1 class="font-display">Sign in to your table</h1>
      <p class="auth-card__sub">Continue your daily walk right where you left off.</p>

      <form novalidate>
        <div class="form-field">
          <label for="loginEmail">Email or Username</label>
          <input type="text" id="loginEmail" name="identifier" autocomplete="username" required />
        </div>
        <div class="form-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" autocomplete="current-password" required />
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-6);">
          <label class="checkbox-row"><input type="checkbox" name="remember" /> Remember me</label>
          <a href="forgot-password.html" style="font-size:var(--text-sm);color:var(--color-primary);font-weight:600;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Sign In</button>
      </form>

      <div class="auth-divider">OR CONTINUE WITH</div>
      <div class="auth-social">
        <button type="button" class="btn btn-ghost" aria-label="Continue with Google">Google</button>
        <button type="button" class="btn btn-ghost" aria-label="Continue with Apple">Apple</button>
        <button type="button" class="btn btn-ghost" aria-label="Continue with Microsoft">Whatsapp</button>
      </div>

      <p class="auth-card__footer">New here? <a href="register.html">Create a free account</a></p>
    </div>
  </div>

  <div class="auth-shell__visual" aria-hidden="true">
    <div class="auth-shell__visual-content">
      <p class="eyebrow" style="color:#FFE3B3;">Verse of the Day</p>
      <h2 class="font-display">"Come to me, all who labor and are heavy laden, and I will give you rest."</h2>
      <p>Matthew 11:28</p>
    </div>
  </div>
</main>

<script src="JS/nav.js"></script>
</body>
</html>
